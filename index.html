<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e27">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AI Task Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <!-- HEADER -->
        <header class="chat-header">
            <div class="header-content">
                <h1>🤖 Your AI Buddy</h1>
                <p>Let's talk about what's on your mind</p>
            </div>
            <div class="emotion-indicator" id="emotionIndicator"></div>
        </header>

        <!-- CHAT AREA -->
        <div class="chat-area">
            <div class="messages-container" id="messagesContainer">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>Hey! 👋 I'm here ha - your friendly AI buddy. What's going on? Tell me what's bothering you, what's exciting you, whatever. No judgment, just real talk, okay? 😊</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- INPUT AREA -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="userThought" 
                    class="chat-input"
                    placeholder="Tell me lang what's on your mind... (example: 'stressed ako sa projects' or 'di ako makafocus')"
                    rows="1"
                ></textarea>
                <button id="generateBtn" class="send-btn">→</button>
            </div>
            <p class="hint">Press Ctrl+Enter or click → to send</p>
        </div>
    </div>

    <script src="ai-assistant.js"></script>
</body>
</html>
